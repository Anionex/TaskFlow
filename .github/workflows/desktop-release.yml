name: desktop-release

# 手动触发或推 v* tag 时，跨平台打包 TaskFlow 桌面端：macOS(arm).dmg + Windows(x86).exe
# 每个 runner 用原生架构编译（macos-latest=arm64 → dmg；windows-latest=x64 → exe），不传 --target，
# 否则 cargo 产物落到 target/<triple>/release 而打包器去 target/release 找会失败。
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 桌面端指向已部署的后端
          VITE_API_BASE: https://taskflowai.asia/api
          # 注：未做 macOS 代码签名/公证（未加入 Apple Developer Program）。
          # 切勿在此设置空的 APPLE_SIGNING_IDENTITY —— 只要该变量存在，tauri 就会
          # 尝试签名并因导入空证书失败而中断构建。将来要签名时，务必同时提供有效的
          # APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY 等 Secrets。
        with:
          projectPath: frontend
          tauriScript: npm run tauri --
          tagName: desktop-v__VERSION__
          releaseName: 'TaskFlow 桌面端 v__VERSION__'
          releaseBody: 'macOS(.dmg) 与 Windows(.exe) 安装包，自动构建。'
          releaseDraft: true
          prerelease: false
