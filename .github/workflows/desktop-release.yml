name: desktop-release

# 手动触发或推 v* tag 时，跨平台打包 TaskFlow 桌面端：macOS(arm).dmg + Windows(x86).exe
# 每个 runner 用原生架构编译（macos-latest=arm64 → dmg；windows-latest=x64 → exe），不传 --target，
# 否则 cargo 产物落到 target/<triple>/release 而打包器去 target/release 找会失败。
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 桌面端指向已部署的后端
          VITE_API_BASE: https://taskflowai.asia/api
          # macOS 代码签名 + 公证。需在仓库 Settings → Secrets 配置以下值；
          # 任一缺失时 tauri-action 自动跳过签名（仍产出未签名包，不报错）。
          # 配齐后，下载的 .app 双击即可打开、无"已损坏"/无警告。
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: frontend
          tauriScript: npm run tauri --
          tagName: desktop-v__VERSION__
          releaseName: 'TaskFlow 桌面端 v__VERSION__'
          releaseBody: 'macOS(.dmg) 与 Windows(.exe) 安装包，自动构建。'
          releaseDraft: true
          prerelease: false
