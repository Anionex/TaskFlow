name: desktop-release

# 手动触发或推 v* tag 时，跨平台打包 TaskFlow 桌面端：macOS(arm).dmg + Windows(x86).exe
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon → .dmg
            target: aarch64-apple-darwin
          - platform: windows-latest    # x86_64 → .exe (NSIS)
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 桌面端指向已部署的后端
          VITE_API_BASE: https://154.36.158.18.sslip.io/api
        with:
          projectPath: frontend
          tauriScript: npm run tauri --
          args: --target ${{ matrix.target }}
          tagName: desktop-v__VERSION__
          releaseName: 'TaskFlow 桌面端 v__VERSION__'
          releaseBody: 'macOS(.dmg) 与 Windows(.exe) 安装包，自动构建。'
          releaseDraft: true
          prerelease: false
